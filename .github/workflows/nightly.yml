name: Nightly refresh

# Per spec §11: 03:00 UTC daily, plus manual trigger from the Actions UI.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

# Cancel any nightly that's still running when a new one is scheduled, so we
# never overlap database writes from two concurrent runs.
concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  refresh:
    name: refresh
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install api package
        run: pip install -e ./api

      - name: Run nightly orchestrator
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          # Reddit credentials intentionally omitted — ingest is deferred to v1.1
          # and the orchestrator's step 2 is a no-op log line, not an actual call.
          ENVIRONMENT: production
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
        run: python -m app.jobs.nightly
